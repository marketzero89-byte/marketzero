services:
  - type: web
    name: marketzero-pbt
    runtime: python
    region: oregon
    plan: free

    # Use slim requirements to avoid OOM on free tier
    buildCommand: pip install -r requirements-render.txt

    # Start command — Render injects PORT automatically
    startCommand: python -c "import os; os.environ['PBT_BROKER']='alpaca'; import subprocess, sys; subprocess.run([sys.executable, 'main.py', 'run', '--host', '0.0.0.0', '--port', '$PORT', '--broker', 'alpaca', '--generations', '100', '--population', '12', '--steps-per-gen', '200', '--lookback', '50'], check=True)"

    healthCheckPath: /api/health

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PBT_BROKER
        value: alpaca
      - key: PBT_GENERATIONS
        value: "100"
      - key: PBT_POPULATION
        value: "12"
      - key: PBT_STEPS_PER_GEN
        value: "200"
      - key: PBT_LOOKBACK
        value: "50"
      # Set PBT_CORS_ORIGINS in Render dashboard → Environment to your deploy URL
      # e.g.  https://marketzero-pbt.onrender.com
      # Leave blank to allow all origins (default).
