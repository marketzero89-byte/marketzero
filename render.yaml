services:
  - type: web
    name: marketzero-pbt
    runtime: python
    region: oregon
    plan: free

    # Use slim requirements to avoid OOM on free tier
    buildCommand: pip install -r requirements-render.txt

    # Start command — Render injects PORT automatically
    startCommand: python main.py run --host 0.0.0.0 --port $PORT --broker paper --population 6 --generations 9999

    healthCheckPath: /api/health

    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PBT_BROKER
        value: paper
      - key: PBT_POPULATION
        value: "6"
      - key: PBT_GENERATIONS
        value: "9999"
      # Set PBT_CORS_ORIGINS in Render dashboard → Environment to your deploy URL
      # e.g.  https://marketzero-pbt.onrender.com
      # Leave blank to allow all origins (default).
